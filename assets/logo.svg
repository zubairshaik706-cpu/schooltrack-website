<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="44" height="44">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <!-- Crescent mask: outer circle minus offset inner circle -->
    <mask id="cm">
      <rect width="44" height="44" fill="black"/>
      <circle cx="20" cy="18" r="11" fill="white"/>
      <circle cx="24" cy="16" r="8.5" fill="black"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="44" height="44" rx="11" fill="url(#bg)"/>

  <!-- Crescent moon -->
  <circle cx="20" cy="18" r="11" fill="white" mask="url(#cm)"/>

  <!-- 4-pointed star beside crescent -->
  <polygon points="33,6 34.3,8.7 37,10 34.3,11.3 33,14 31.7,11.3 29,10 31.7,8.7"
           fill="white" opacity="0.88"/>

  <!-- Progress bars at bottom (school tracking) -->
  <rect x="7"  y="34" width="4.5" height="6"  rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="13" y="31" width="4.5" height="9"  rx="2" fill="rgba(255,255,255,0.55)"/>
  <rect x="19" y="28" width="4.5" height="12" rx="2" fill="rgba(255,255,255,0.72)"/>
  <rect x="25" y="30" width="4.5" height="10" rx="2" fill="rgba(255,255,255,0.6)"/>
  <rect x="31" y="26" width="4.5" height="14" rx="2" fill="rgba(255,255,255,0.92)"/>
</svg>
